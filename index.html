<!DOCTYPE html>
<html>
<head>

<title>Billing Application</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>Billing Application</h1>

<div class="container">

<!-- LEFT SIDE -->

<div class="card left">

<h3>Owner Details</h3>

<input placeholder="Owner Name">

<input placeholder="Address">

<input
type="text"
placeholder="Phone Number"
pattern="[1-9]{1}[0-9]{9}"
title="Phone number cannot start with 0"
required
>

<h3>Receiver Info</h3>

<input placeholder="Receiver Name">

<input placeholder="Address">

<input
type="text"
placeholder="Phone Number"
pattern="[1-9]{1}[0-9]{9}"
title="Phone number cannot start with 0"
required
>

</div>

<!-- RIGHT SIDE -->

<div class="card right">

<h3>Product Details</h3>

<table id="productTable">

<thead>

<tr>
<th>SN</th>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>GST %</th>
<th>Total</th>
</tr>

</thead>

<tbody id="tableBody">

<tr>

<td>1</td>

<td>
<input type="text" class="product">
</td>

<td>
<input type="number" class="price" oninput="calculate()">
</td>

<td>
<input type="number" class="qty" oninput="calculate()">
</td>

<td>
<input type="number" class="gst" value="18" oninput="calculate()">
</td>

<td>
<input type="text" class="total" readonly>
</td>

</tr>

</tbody>

</table>

<button onclick="addRow()">Add Product</button>

<div class="grand">

Grand Total: ₹ <span id="grandTotal">0</span>

</div>

<br>

<button onclick="window.print()">Print</button>

<button onclick="window.print()">Download PDF</button>

</div>

</div>

<script>

function calculate(){

let rows=document.querySelectorAll("#tableBody tr")

let grandTotal=0

rows.forEach(row=>{

let price=row.querySelector(".price").value
let qty=row.querySelector(".qty").value
let gst=row.querySelector(".gst").value

price=parseFloat(price)||0
qty=parseFloat(qty)||0
gst=parseFloat(gst)||0

let subtotal=price*qty
let gstAmount=subtotal*(gst/100)
let total=subtotal+gstAmount

row.querySelector(".total").value=total.toFixed(2)

grandTotal+=total

})

document.getElementById("grandTotal").innerText=grandTotal.toFixed(2)

}


function addRow(){

let table=document.getElementById("tableBody")

let rowCount=table.rows.length+1

let row=document.createElement("tr")

row.innerHTML=`

<td>${rowCount}</td>

<td><input type="text" class="product"></td>

<td><input type="number" class="price" oninput="calculate()"></td>

<td><input type="number" class="qty" oninput="calculate()"></td>

<td><input type="number" class="gst" value="18" oninput="calculate()"></td>

<td><input type="text" class="total" readonly></td>

`

table.appendChild(row)

}

</script>

</body>
</html>
